version: "3.8"

services:
  doris:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8095:8095"
    environment:
      # For local development, point to your BlueOS instance
      - DORIS_BLUEOS_ADDRESS=http://192.168.31.66
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - doris-data:/data
    restart: unless-stopped

volumes:
  doris-data:

